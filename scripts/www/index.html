<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, apple-mobile-web-app-capable=yes">
    <title>刷题宝典 · 最终恢复版</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --bg: #f2f6fc; --surface: #fff; --text: #1e293b; --text2: #5b6e8c; --text3: #8b9eb0;
            --border: #dce3ec; --primary: #4f6ef7; --primary-light: #e8edff; --success: #2ecc71;
            --success-light: #e6f9f0; --danger: #e74c3c; --danger-light: #fdedec; --warning: #f39c12;
            --shadow: 0 2px 12px rgba(0,20,40,0.04); --radius: 18px; --radius-sm: 12px;
        }
        .theme-green { --bg:#e3f0e8; --surface:#f7fcf9; --text:#1e3b2f; --text2:#4a6b5a; --text3:#6e8b7a; --border:#c8dcd0; --primary:#2e8b57; --primary-light:#e0f2e9; }
        .theme-yellow { --bg:#f8f4e6; --surface:#fffef7; --text:#3d3522; --text2:#6b5d3e; --text3:#8c7d5a; --border:#e2d8ba; --primary:#b8860b; --primary-light:#faf3e0; }
        .theme-beige { --bg:#f5efe6; --surface:#fdfaf5; --text:#4a3f35; --text2:#6d5d4b; --text3:#8c7a65; --border:#ddd0bd; --primary:#8b5a2b; --primary-light:#f3ece0; }
        .theme-lavender { --bg:#f3f0f8; --surface:#fcfafe; --text:#2d2640; --text2:#5d4e6b; --text3:#7b6b8a; --border:#dcd2e8; --primary:#6c5ce7; --primary-light:#ede8ff; }
        body.dark-mode { --bg:#121826; --surface:#1e2532; --text:#e2e8f0; --text2:#94a3b8; --text3:#64748b; --border:#2d3548; --primary:#818cf8; --primary-light:#1e1b4b; --success:#34d399; --success-light:#064e3b; --danger:#f87171; --danger-light:#7f1d1d; --warning:#fbbf24; --shadow:0 2px 12px rgba(0,0,0,0.3); }
        body { font-family:-apple-system,BlinkMacSystemFont,sans-serif; background:#0f1119; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:14px; -webkit-tap-highlight-color:transparent; user-select:none; overscroll-behavior-y:none; }
        .phone-frame { width:400px; max-width:100%; height:88vh; max-height:820px; background:#181c28; border-radius:40px; padding:12px; box-shadow:0 0 0 3px #2d3344,0 25px 60px rgba(0,0,0,0.6); display:flex; flex-direction:column; }
        .phone-screen { flex:1; background:var(--bg); border-radius:30px; overflow:hidden; display:flex; flex-direction:column; position:relative; transition:background 0.2s; }
        .auth-overlay { position:absolute; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:200; display:flex; align-items:center; justify-content:center; flex-direction:column; padding:20px; transition:opacity 0.3s, visibility 0.3s; }
        .auth-overlay.hidden { opacity:0; visibility:hidden; pointer-events:none; }
        .auth-card { background:var(--surface); border-radius:var(--radius); padding:30px; width:100%; max-width:320px; box-shadow:0 20px 40px rgba(0,0,0,0.2); text-align:center; }
        .app-header { display:flex; align-items:center; justify-content:space-between; padding:6px 18px 10px; flex-shrink:0; }
        .app-title { font-size:21px; font-weight:700; color:var(--text); }
        .header-icons { display:flex; gap:8px; }
        .icon-btn { width:36px; height:36px; border-radius:50%; background:var(--surface); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:17px; cursor:pointer; color:var(--text); transition:all 0.2s; box-shadow:var(--shadow); }
        .icon-btn:active { transform:scale(0.92); }
        .app-content { flex:1; overflow-y:auto; padding:4px 14px 16px; display:flex; flex-direction:column; gap:12px; scrollbar-width:none; overscroll-behavior:none; }
        .app-content::-webkit-scrollbar { display:none; }
        .bottom-nav { display:flex; justify-content:space-around; padding:8px 8px 14px; flex-shrink:0; background:var(--surface); border-top:1px solid var(--border); }
        .nav-item { display:flex; flex-direction:column; align-items:center; gap:3px; font-size:10px; font-weight:600; color:var(--text3); padding:6px 10px; border-radius:16px; cursor:pointer; transition:0.2s; }
        .nav-item.active { color:var(--primary); background:var(--primary-light); }
        .nav-icon { font-size:20px; }
        .page { display:none; flex-direction:column; gap:12px; flex:1; }
        .page.active { display:flex; }
        .card { background:var(--surface); border-radius:var(--radius); padding:16px; border:1px solid var(--border); box-shadow:var(--shadow); }
        .subject-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
        .subject-card { background:var(--surface); border-radius:var(--radius); padding:18px 10px; text-align:center; border:1px solid var(--border); box-shadow:var(--shadow); cursor:pointer; transition:0.2s; }
        .subject-card:active { transform:scale(0.96); }
        .subject-icon { font-size:30px; margin-bottom:6px; }
        .subject-name { font-weight:700; color:var(--text); font-size:15px; }
        .subject-count { font-size:11px; color:var(--text3); }
        .btn { display:inline-flex; align-items:center; justify-content:center; gap:7px; padding:11px 16px; border-radius:26px; font-weight:600; font-size:13px; cursor:pointer; border:none; transition:0.2s; background:var(--surface); color:var(--text); border:1px solid var(--border); box-shadow:var(--shadow); }
        .btn:active { transform:scale(0.96); }
        .btn-primary { background:var(--primary); color:#fff; border:none; }
        .btn-danger { background:var(--danger); color:#fff; border:none; }
        .btn-sm { padding:7px 14px; font-size:12px; border-radius:22px; }
        .btn-block { width:100%; }
        .question-card { background:var(--surface); border-radius:var(--radius); padding:18px; border:1px solid var(--border); box-shadow:var(--shadow); }
        .badge { display:inline-block; padding:4px 10px; border-radius:18px; font-size:11px; font-weight:600; background:var(--primary-light); color:var(--primary); }
        .option-item { display:flex; align-items:center; gap:10px; padding:12px 14px; border-radius:14px; border:2px solid var(--border); background:var(--surface); margin-bottom:7px; cursor:pointer; transition:0.2s; font-weight:500; color:var(--text); }
        .option-item.selected { border-color:var(--primary); background:var(--primary-light); }
        .option-item.correct { border-color:var(--success); background:var(--success-light); }
        .option-item.wrong { border-color:var(--danger); background:var(--danger-light); }
        .timer-bar { display:flex; justify-content:space-between; align-items:center; background:var(--surface); border-radius:var(--radius-sm); padding:10px 16px; border:1px solid var(--border); }
        .timer-display { font-family:monospace; font-size:22px; font-weight:700; color:var(--text); }
        .dot { width:8px; height:8px; border-radius:50%; background:var(--border); display:inline-block; cursor:pointer; }
        .dot.answered { background:var(--primary); }
        .dot.current { background:var(--warning); width:10px; height:10px; }
        .modal-mask { position:fixed; inset:0; background:rgba(0,0,0,0.4); display:flex; align-items:center; justify-content:center; z-index:1000; backdrop-filter:blur(4px); }
        .modal-card { background:var(--surface); border-radius:var(--radius); padding:22px; width:90%; max-width:380px; max-height:80vh; overflow-y:auto; box-shadow:0 20px 40px rgba(0,0,0,0.25); }
        .toast { position:fixed; top:30px; left:50%; transform:translateX(-50%); background:#1e293b; color:#fff; padding:10px 22px; border-radius:28px; font-weight:600; font-size:13px; z-index:999; opacity:0; transition:opacity 0.3s; pointer-events:none; }
        .toast.show { opacity:1; }
        input,select,textarea { width:100%; padding:10px 12px; border-radius:12px; border:1px solid var(--border); background:var(--surface); font-size:14px; color:var(--text); margin-bottom:8px; font-family:inherit; }
        .color-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:12px; }
        .color-swatch { height:50px; border-radius:14px; cursor:pointer; border:2px solid transparent; transition:0.2s; }
        .color-swatch.selected { border-color:var(--primary); }
        .dot-indicator { display:flex; gap:5px; flex-wrap:wrap; }
        .flex-row { display:flex; gap:8px; align-items:center; }
        .flex-row>* { flex:1; }
        .text-center { text-align:center; }
        .consent-label { font-size:12px; color:var(--text2); display:flex; align-items:center; gap:6px; margin:12px 0; }
        .consent-label input { width:auto; margin:0; }
        .disclaimer-footer { font-size:11px; color:var(--text3); margin-top:12px; text-align:center; }
        .read-hint { font-size:12px; color:var(--danger); margin:4px 0 8px 0; }
        @media (max-width:440px) { body { padding:0; background:var(--bg); } .phone-frame { width:100%; height:100vh; max-height:none; border-radius:0; padding:0; background:transparent; box-shadow:none; } .phone-screen { border-radius:0; } }
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>
    <div class="phone-frame">
        <div class="phone-screen" id="phoneScreen">
            <div class="auth-overlay" id="authOverlay">
                <div class="auth-card">
                    <h3 id="authTitle">设置密码</h3>
                    <input type="password" id="authPwd1" placeholder="请输入密码">
                    <input type="password" id="authPwd2" placeholder="确认密码">
                    <div class="consent-label">
                        <input type="checkbox" id="agreeCheck"> <span>我已阅读并同意 <a href="#" id="showDisclaimer">免责声明</a></span>
                    </div>
                    <div class="read-hint">👉 请点击上方「免责声明」链接，阅读并等待倒计时结束后方可勾选同意</div>
                    <button class="btn btn-primary btn-block" id="authSubmitBtn" disabled>确定</button>
                    <div id="authError" style="color:var(--danger);font-size:12px;margin-top:8px;"></div>
                    <div class="disclaimer-footer">本应用程序仅供个人学习、研究与交流使用，严禁用于任何商业目的或非法活动。</div>
                </div>
            </div>
            <div id="mainApp" style="display:none;flex-direction:column;height:100%;">
                <div class="app-header">
                    <div class="app-title">📖 刷题宝典</div>
                    <div class="header-icons">
                        <div class="icon-btn" id="themeBtn">🎨</div>
                        <div class="icon-btn" id="darkToggle">🌙</div>
                        <div class="icon-btn" id="backBtn" style="display:none;">←</div>
                    </div>
                </div>
                <div class="app-content" id="appContent">
                    <!-- 首页 -->
                    <div class="page active" id="homePage">
                        <div class="flex-row" style="justify-content:space-between;">
                            <span style="font-weight:700;font-size:16px;color:var(--text);">📚 课目分类</span>
                            <button class="btn btn-sm" id="manageSubjectsBtn">⚙️ 管理</button>
                        </div>
                        <div class="subject-grid" id="subjectGrid"></div>
                        <div class="flex-row"><button class="btn" id="examBtn">📝 模拟考试</button><button class="btn" id="wrongBookBtn">📋 错题集</button></div>
                        <div class="flex-row"><button class="btn" id="importBtn">📥 导入题库</button><button class="btn" id="addQuestionBtn">✏️ 添加题目</button></div>
                        <button class="btn" id="statsBtn" style="width:100%;">📊 学习统计</button>
                        <button class="btn" id="manageQuestionsBtn" style="width:100%;">📋 题库管理</button>
                    </div>
                    <!-- 刷题页 -->
                    <div class="page" id="studyPage">
                        <div class="timer-bar"><span id="studyProgressText">第1题</span><span id="studyModeText" style="font-size:13px;color:var(--text2);"></span></div>
                        <div id="studyArea" style="flex:1;overflow-y:auto;"></div>
                        <div class="flex-row"><button class="btn btn-sm" id="prevStudyBtn">⬅ 上一题</button><button class="btn btn-primary btn-sm" id="nextStudyBtn">下一题 ➡</button></div>
                        <button class="btn btn-sm" id="exitStudyBtn" style="width:100%;">🏠 返回首页</button>
                    </div>
                    <!-- 考试页 -->
                    <div class="page" id="examPage">
                        <div class="timer-bar"><span class="timer-display" id="examTimerDisplay">20:00</span><span id="examProgressText">1/20</span></div>
                        <div class="dot-indicator" id="examDots"></div>
                        <div id="examArea" style="flex:1;overflow-y:auto;"></div>
                        <div class="flex-row"><button class="btn btn-sm" id="prevExamBtn">⬅ 上一题</button><button class="btn btn-sm" id="nextExamBtn">下一题 ➡</button></div>
                        <button class="btn btn-danger btn-sm" id="submitExamBtn" style="width:100%;">📩 提交试卷</button>
                    </div>
                    <!-- 结果页 -->
                    <div class="page" id="resultPage"><div id="resultContent"></div></div>
                    <!-- 题库管理页 -->
                    <div class="page" id="manageQuestionsPage">
                        <input type="text" id="manageSearchInput" placeholder="🔍 搜索题目或课目...">
                        <div class="flex-row">
                            <select id="manageSubjectFilter"><option value="all">全部课目</option></select>
                            <select id="manageTypeFilter"><option value="all">全部题型</option><option>单选</option><option>多选</option><option>填空</option><option>判断</option><option>简答</option></select>
                        </div>
                        <button class="btn btn-danger btn-sm" id="deleteAllBtn">🗑 一键删除当前筛选题目</button>
                        <div id="manageList" style="display:flex;flex-direction:column;gap:8px;"></div>
                    </div>
                    <!-- 添加题目页 -->
                    <div class="page" id="addQuestionPage">
                        <select id="addSubjectSelect"></select>
                        <select id="addTypeSelect"><option value="单选">单选</option><option value="多选">多选</option><option value="填空">填空</option><option value="判断">判断</option><option value="简答">简答</option></select>
                        <textarea id="addQuestionText" rows="3" placeholder="题目内容"></textarea>
                        <div id="addOptionsArea"></div>
                        <div id="addAnswerArea"><label>正确答案</label></div>
                        <textarea id="addExplanationText" rows="2" placeholder="解析(可选)"></textarea>
                        <button class="btn btn-primary" id="saveQuestionBtn">💾 保存题目</button>
                    </div>
                    <!-- 导入页（保留dropZone显示，但改用按钮逻辑） -->
                    <div class="page" id="importPage">
                        <div class="card text-center" style="cursor:pointer;" id="dropZone">📂 点击选择CSV文件</div>
                        <input type="file" id="fileInput" accept=".csv" style="display:none;">
                        <div style="font-size:12px;color:var(--text2); margin-top:8px;">CSV固定8列：课目,题型,题目,选项A,选项B,选项C,选项D,正确答案<br>判断/填空/简答的选项列可为空</div>
                        <button class="btn btn-sm" id="downloadTemplateBtn">📥 下载模板</button>
                        <div id="importResultMsg" style="font-size:13px;line-height:1.6;"></div>
                    </div>
                    <!-- 错题集页 -->
                    <div class="page" id="wrongBookPage">
                        <div class="flex-row"><select id="wrongSubjectFilter"><option value="all">全部课目</option></select><button class="btn btn-sm" id="redoWrongBtn">🔄 重做</button><button class="btn btn-sm" id="clearWrongBtn">🗑 清空</button></div>
                        <div id="wrongList"></div>
                    </div>
                    <!-- 统计页 -->
                    <div class="page" id="statsPage">
                        <div class="card text-center"><div style="font-size:36px;font-weight:700;" id="statPractices">0</div><div style="color:var(--text2);">总练习次数</div></div>
                        <div class="card text-center"><div style="font-size:36px;font-weight:700;" id="statTotalQ">0</div><div style="color:var(--text2);">总做题数</div></div>
                        <div class="card text-center"><div style="font-size:36px;font-weight:700;color:var(--success);" id="statCorrectRate">0%</div><div style="color:var(--text2);">正确率</div></div>
                        <div class="card text-center"><div style="font-size:36px;font-weight:700;" id="statExams">0</div><div style="color:var(--text2);">考试次数</div></div>
                        <div class="card text-center"><div style="font-size:36px;font-weight:700;" id="statAvgScore">0</div><div style="color:var(--text2);">考试均分</div></div>
                        <button class="btn btn-sm" id="resetStatsBtn">重置统计</button>
                    </div>
                </div>
                <div class="bottom-nav">
                    <div class="nav-item active" data-page="homePage"><span class="nav-icon">🏠</span>首页</div>
                    <div class="nav-item" data-page="studyPage"><span class="nav-icon">📖</span>刷题</div>
                    <div class="nav-item" data-page="examPage"><span class="nav-icon">📝</span>考试</div>
                    <div class="nav-item" data-page="manageQuestionsPage"><span class="nav-icon">📋</span>题库</div>
                </div>
            </div>
        </div>
    </div>
    <script>
    (function() {
        const Q_KEY='qqq',S_KEY='sss',T_KEY='ttt',W_KEY='www',ST_KEY='stst',P_KEY='ppp';
        const LOGIN_KEY='lll',LOGIN_TIME=4*60*60*1000;
        const TYPES=['单选','多选','填空','判断','简答'];
        const DEF_Q=[{id:1,subject:'课目一',type:'单选',question:'驾驶机动车违反道路交通安全法的行为属于？',options:['违章行为','违法行为','过失行为','违规行为'],answer:1,explanation:''},{id:2,subject:'课目一',type:'判断',question:'驾驶时必须使用安全带。',options:['正确','错误'],answer:0,explanation:''},{id:3,subject:'课目一',type:'多选',question:'以下哪些是危险驾驶行为？',options:['醉酒驾驶','追逐竞驶','超员载客','正常变道'],answer:[0,1,2],explanation:''},{id:4,subject:'课目一',type:'填空',question:'高速公路最低限速为____公里/小时。',options:[],answer:'60',explanation:''},{id:5,subject:'课目二',type:'简答',question:'简述倒车入库的操作要点。',options:[],answer:'控制车速，观察后视镜，找准点位打方向。',explanation:''}];
        const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);
        const toast=$('#toast');let tt;
        function showToast(m){toast.textContent=m;toast.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>toast.classList.remove('show'),2000);}
        function load(k,d){try{return JSON.parse(localStorage.getItem(k))||d;}catch{return d;}}
        function save(k,v){localStorage.setItem(k,JSON.stringify(v));}
        function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
        function genId(){return Date.now()+Math.floor(Math.random()*1000);}
        function norm(s){return typeof s==='string'?s.replace(/[，。！？、；：""'',.!?;:\s]+/g,'').trim():s;}
        function check(q,a){if(q.type==='多选'){if(!Array.isArray(a))return false;const x=[...q.answer].sort(),y=[...a].sort();return x.length===y.length&&x.every((v,i)=>v===y[i]);}else if(q.type==='填空'||q.type==='简答')return norm(a)===norm(q.answer);else return a===q.answer;}
        function fmt(q,a){if(a===undefined)return'未作答';if(q.type==='多选')return Array.isArray(a)?a.map(i=>'ABCD'[i]).join(','):String(a);if(q.type==='填空'||q.type==='简答')return String(a);return(q.type==='判断'?'':('ABCD'[a]+'. '))+(q.options[a]||'');}
        function addWrong(id){if(!wrongSet.includes(id)){wrongSet.push(id);save(W_KEY,wrongSet);}}
        let subjects=load(S_KEY,['课目一','课目二','课目三','课目四']);
        let questions=load(Q_KEY,JSON.parse(JSON.stringify(DEF_Q)));
        let settings=load(T_KEY,{dark:false,examCount:20,examTime:20});
        let wrongSet=load(W_KEY,[]);
        let stats=load(ST_KEY,{practices:0,totalQ:0,correctQ:0,exams:0,examTotalQ:0,examCorrectQ:0});
        let currentPage='homePage';
        let studyList=[],studyIdx=0,studyAns={},studyMode='';
        let examList=[],examIdx=0,examAns={},examTimer=null,examTimeLeft=0,examSubmitted=false;
        const THEMES={'默认蓝白':'','护眼绿豆沙':'theme-green','护眼浅黄':'theme-yellow','护眼米色':'theme-beige','护眼淡紫':'theme-lavender'};
        let curTheme=localStorage.getItem('thm')||'默认蓝白';
        function applyTheme(n){document.body.classList.remove(...Object.values(THEMES).filter(Boolean));const c=THEMES[n];if(c)document.body.classList.add(c);curTheme=n;localStorage.setItem('thm',n);}

        // ====== 原版 processFile ======
        function processFile(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const buf = e.target.result;
                let text;
                try { text = new TextDecoder('utf-8', { fatal: true }).decode(buf); } catch {
                    try { text = new TextDecoder('gbk', { fatal: true }).decode(buf); } catch { text = new TextDecoder('gb2312').decode(buf); }
                }
                if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
                const lines = text.split(/\r?\n/).filter(l => l.trim());
                if (lines.length < 2) { $('#importResultMsg').innerHTML = '❌ 文件为空'; showToast('导入失败'); return; }
                let imported = 0, skipped = 0, errors = [], warnings = [];
                for (let i = 1; i < lines.length; i++) {
                    const raw = parseCSVLine(lines[i]);
                    const cols = raw.map(s => s.trim());
                    const row = i + 1;
                    if (cols.length < 8) { skipped++; errors.push(`第${row}行：列数不足8，实际${cols.length}列`); continue; }
                    const subject = cols[0], type = cols[1], question = cols[2];
                    const optionCols = cols.slice(3, 7).filter(s => s !== '');
                    const answerRaw = cols[7];
                    if (!answerRaw) { skipped++; errors.push(`第${row}行：正确答案（第8列）为空`); continue; }
                    let options = [], answer = null;
                    try {
                        if (type === '判断' || type === '填空' || type === '简答') {
                            options = [];
                            if (type === '判断') {
                                const a = answerRaw.trim().toUpperCase();
                                if (['正确', '对', 'A', '0'].includes(a)) answer = 0;
                                else if (['错误', '错', 'B', '1'].includes(a)) answer = 1;
                                else throw new Error('判断答案必须为正确/错误/A/B');
                                options = ['正确', '错误'];
                            } else {
                                answer = answerRaw.trim();
                            }
                        } else if (type === '单选' || type === '多选') {
                            if (optionCols.length < 2) throw new Error('选项至少2个');
                            options = optionCols;
                            if (type === '多选') {
                                const parts = answerRaw.split(/[,，]/).map(s => s.trim().toUpperCase());
                                const idxs = parts.map(p => {
                                    if (/^[A-D]$/.test(p)) return 'ABCD'.indexOf(p);
                                    const n = parseInt(p);
                                    return (n >= 0 && n < options.length) ? n : -1;
                                }).filter(i => i >= 0);
                                if (idxs.length === 0) throw new Error('多选答案格式错误');
                                answer = idxs;
                            } else {
                                const a = answerRaw.trim().toUpperCase();
                                let idx = 'ABCD'.indexOf(a);
                                if (idx < 0) idx = parseInt(a);
                                if (isNaN(idx) || idx < 0 || idx >= options.length) {
                                    idx = 0;
                                    warnings.push(`第${row}行：单选答案超出选项范围，已自动修正为“${options[0]}”`);
                                }
                                answer = idx;
                            }
                        } else {
                            throw new Error('未知题型');
                        }
                    } catch (err) { skipped++; errors.push(`第${row}行：${err.message}`); continue; }
                    if (!subjects.includes(subject)) { subjects.push(subject); save(S_KEY, subjects); }
                    questions.push({ id: genId() + imported, subject, type, question, options, answer, explanation: '' });
                    imported++;
                }
                if (imported > 0) {
                    save(Q_KEY, questions);
                    let msg = `✅ 成功导入 <b>${imported}</b> 题`;
                    if (skipped > 0) msg += `，跳过 <b>${skipped}</b> 行`;
                    if (warnings.length > 0) msg += `<br><span style="font-size:11px;color:var(--warning);">⚠️ 警告：${warnings.slice(0,3).join('；')}${warnings.length>3?'...':''}</span>`;
                    if (errors.length > 0) msg += `<br><span style="font-size:11px;color:var(--danger);">错误：${errors.slice(0,5).join('；')}${errors.length>5?'...':''}</span>`;
                    $('#importResultMsg').innerHTML = msg;
                    showToast(`导入 ${imported} 题`);
                    renderHome();
                } else {
                    let msg = '❌ 未导入任何题目';
                    if (errors.length > 0) msg += `<br><span style="font-size:11px;color:var(--danger);">${errors.slice(0,5).join('；')}</span>`;
                    $('#importResultMsg').innerHTML = msg;
                    showToast('导入失败');
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function parseCSVLine(line) { const res = []; let cur = '', q = false; for (let ch of line) { if (ch === '"') { q = !q; continue; } if (ch === ',' && !q) { res.push(cur.trim()); cur = ''; } else cur += ch; } res.push(cur.trim()); return res; }
